<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janela Aberta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E1A24;
    --card: #16232F;
    --surface: #1D2C39;
    --text: #EAEDEF;
    --muted: #8A9BA8;
    --border: #24343F;

    --brass: #B8955A;
    --brass-2: #D4B67E;
    --brass-rgb: 184, 149, 90;
    --on-accent: #0E1A24;

    --pitch: #1F6F45;
    --pitch-2: #123B26;

    --gk: #B8955A;
    --df: #35506A;
    --mf: #4A6140;
    --at: #8C5423;

    --signal-red: #E07A6D;
    --signal-red-fill: #A83B2E;
    --signal-green: #4CAF7D;
    --signal-green-fill: #1F7A50;
    --neutral-fill: #3B4956;

    --chalk: #F0F2F4;

    --font-display: 'Big Shoulders Display', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', 'IBM Plex Sans', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body), -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px;
  }
  header h1 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--brass);
    font-size: 1.5rem;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 18px;
  }
  section h2 {
    margin-top: 0;
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: 0.01em;
    font-size: 1.2rem;
    color: var(--text);
  }
  label {
    display: block;
    font-size: 0.9rem;
    margin-bottom: 6px;
    color: var(--muted);
  }
  input[type="text"], input[type="password"], input[type="number"] {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.95rem;
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-body);
  }
  input::placeholder { color: var(--muted); opacity: 1; }
  input[type="number"] { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .row > div { flex: 1; }
  button {
    background: var(--brass);
    color: var(--on-accent);
    border: none;
    border-radius: 6px;
    padding: 9px 16px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: var(--brass-2); }
  button.secondary {
    background: transparent;
    color: var(--brass);
    border: 1px solid var(--brass);
  }
  button.secondary:hover { background: rgba(var(--brass-rgb), 0.14); }
  button:disabled { background: var(--neutral-fill); color: var(--muted); cursor: default; }
  .hint {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 8px;
  }
  .error {
    color: var(--signal-red);
    font-size: 0.9rem;
    margin-top: 8px;
  }
  .status {
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 8px;
  }
  .team-results {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .team-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    background: var(--surface);
  }
  .team-option:hover { background: rgba(var(--brass-rgb), 0.14); }
  .team-option img { width: 28px; height: 28px; object-fit: contain; }
  .team-option .name { font-weight: 600; }
  .team-option .country { color: var(--muted); font-size: 0.85rem; }

  .hidden { display: none !important; }

  .resume-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    background: rgba(var(--brass-rgb), 0.12);
    border: 1px solid var(--brass);
    border-radius: 8px;
    padding: 12px 14px;
    margin: 14px 0;
    font-size: 0.9rem;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .top-bar label {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .actions-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .orcamento-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .orcamento-row label {
    margin-bottom: 0;
    white-space: nowrap;
  }
  .orcamento-row input[type="number"] {
    max-width: 100px;
  }

  .nota-input {
    flex: 1;
    min-width: 70px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 0.8rem;
    color: var(--text);
    font-family: var(--font-body);
  }

  @keyframes toast-in-out {
    0% { opacity: 0; transform: translate(-50%, 12px); }
    10% { opacity: 1; transform: translate(-50%, 0); }
    88% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, 12px); }
  }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--brass);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 0.9rem;
    max-width: 90vw;
    text-align: center;
    z-index: 1000;
    pointer-events: none;
    animation: toast-in-out 2.5s ease forwards;
  }

  :focus-visible {
    outline: 2px solid var(--brass);
    outline-offset: 2px;
  }
  input[type="color"] {
    width: 30px;
    height: 30px;
    padding: 0;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: none;
    cursor: pointer;
    overflow: hidden;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

  .masthead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .masthead-club { display: flex; align-items: center; gap: 12px; }
  .club-crest { width: 44px; height: 44px; object-fit: contain; flex-shrink: 0; }
  .masthead-club .club-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.6rem;
    letter-spacing: 0.01em;
    color: var(--text);
  }
  .masthead-saldo { text-align: right; }
  .masthead-saldo .saldo-label {
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .masthead-saldo .saldo-value {
    font-family: var(--font-mono);
    font-size: 1.7rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .masthead-saldo .saldo-value.positivo { color: var(--signal-green); }
  .masthead-saldo .saldo-value.negativo { color: var(--signal-red); }

  .group {
    margin-bottom: 20px;
  }
  .group-title {
    font-family: var(--font-display);
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 8px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--border);
  }
  .group-title.gk { border-color: var(--gk); }
  .group-title.df { border-color: var(--df); }
  .group-title.mf { border-color: var(--mf); }
  .group-title.at { border-color: var(--at); }

  .player {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
  }
  .player:last-child { border-bottom: none; }
  .player.reforco-row {
    border-left: 3px solid var(--signal-green-fill);
    padding-left: 8px;
    background: rgba(31, 122, 80, 0.08);
  }
  .player-row-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .player-row-top input[type="text"]::placeholder {
    color: var(--muted);
  }
  .player-row-top input[type="text"].nome-reforco {
    font-weight: 700;
  }
  .player-row-top input[type="text"].nome-indefinido::placeholder {
    color: var(--signal-green);
    font-weight: 700;
  }
  .avatar-placeholder.indefinido {
    background: var(--signal-green-fill);
    color: var(--text);
  }
  .player-row-top input[type="text"] {
    flex: 1;
    min-width: 70px;
    width: auto;
  }
  .player-row-bottom {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding-left: 26px;
  }
  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface);
  }
  .avatar-placeholder {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--surface);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.8rem;
  }
  .numero-wrap {
    display: flex;
    align-items: center;
    gap: 3px;
    color: var(--muted);
    font-size: 0.9rem;
    font-family: var(--font-mono);
    flex-shrink: 0;
  }
  .numero-wrap input[type="number"] {
    width: 58px;
    flex-shrink: 0;
  }
  .numero-wrap input[type="number"]::-webkit-inner-spin-button,
  .numero-wrap input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .numero-wrap input[type="number"] {
    -moz-appearance: textfield;
  }

  .drag-handle {
    cursor: grab;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1;
    padding: 0 2px;
    touch-action: none;
    flex-shrink: 0;
  }
  .drag-handle:active { cursor: grabbing; }
  .group-rows .player:last-child { border-bottom: none; }
  .badge {
    font-family: var(--font-display);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 2px 7px;
    border-radius: 4px;
    color: var(--text);
  }
  .badge.gk { background: var(--gk); color: var(--bg); }
  .badge.df { background: var(--df); }
  .badge.mf { background: var(--mf); }
  .badge.at { background: var(--at); }
  .badge.entra { background: var(--signal-green-fill); }
  .badge.fora { background: var(--neutral-fill); }

  .estado-select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 6px;
    font-size: 0.8rem;
    font-family: var(--font-body);
    cursor: pointer;
    flex-shrink: 0;
  }
  .estado-select.estado-sai {
    border-color: var(--signal-red);
    color: var(--signal-red);
    background: rgba(224, 122, 109, 0.12);
  }
  .estado-select.estado-emprestado,
  .estado-select.estado-fora {
    border-color: var(--muted);
    opacity: 0.85;
  }
  .estado-select.estado-reserva {
    border-color: var(--muted);
  }
  .player.reserva-row {
    opacity: 0.65;
  }

  .value-fields {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .value-fields input[type="number"] {
    width: 80px;
    flex-shrink: 0;
  }
  .value-fields input[type="number"]::-webkit-inner-spin-button,
  .value-fields input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .value-fields input[type="number"] {
    -moz-appearance: textfield;
  }

  .remove-link {
    background: none;
    border: none;
    color: var(--signal-red);
    font-size: 0.8rem;
    padding: 2px 4px;
    text-decoration: underline;
  }
  .remove-link:hover { background: none; color: var(--signal-red-fill); }

  .fora-group .player, .vendidos-group .player, .emprestados-group .player { opacity: 0.7; }

  .reforco-form {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-top: 10px;
    padding: 10px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
  }
  .reforco-form > div { flex: 1; min-width: 100px; }
  .reforco-form select {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.95rem;
    background: var(--card);
    color: var(--text);
  }

  .ganhos-extra-list {
    margin-top: 10px;
  }
  .ganho-extra-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 6px;
    font-size: 0.88rem;
  }
  .ganho-extra-item .ganho-descricao {
    flex: 1;
  }
  .ganho-extra-item .ganho-valor {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    color: var(--signal-green);
  }

  .secundarias-text {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .pos-toggle-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.78rem;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .pos-toggle-btn:hover { background: var(--surface); }

  .position-editor {
    margin-top: 6px;
    padding: 10px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
  }
  .position-editor-hint {
    color: var(--muted);
    font-size: 0.78rem;
    margin: 0 0 8px;
  }

  .mini-campo {
    background: linear-gradient(180deg, var(--pitch), var(--pitch-2));
    border-radius: 8px;
    padding: 8px;
    display: flex;
    flex-direction: column-reverse;
    gap: 3px;
    margin-bottom: 10px;
  }
  .mini-campo-linha {
    display: flex;
    gap: 3px;
  }
  .mini-campo-linha.compact { justify-content: center; }
  .mini-campo-linha.compact .mini-campo-zona { flex: 0 1 64px; }
  .mini-campo-zona {
    flex: 1;
    min-height: 28px;
    min-width: 30px;
    border: 1px dashed rgba(255,255,255,0.35);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 0.64rem;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    user-select: none;
    touch-action: manipulation;
  }
  .mini-campo-zona:hover { background: rgba(255,255,255,0.15); }
  .mini-campo-zona.principal {
    background: var(--brass);
    color: var(--on-accent);
    border-style: solid;
    border-color: var(--brass);
    font-weight: 700;
  }
  .mini-campo-zona.secundaria {
    background: rgba(var(--brass-rgb), 0.3);
    border-style: dashed;
    border-color: var(--brass);
    color: var(--text);
  }
  .mini-campo-zona-stack {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .mini-campo-zona-stack .mini-campo-zona {
    flex: 1;
    min-height: 14px;
    font-size: 0.5rem;
  }
  .mini-campo-zona.spacer {
    border-color: transparent;
    cursor: default;
  }
  .mini-campo-zona.spacer:hover { background: none; }

  .view-tabs {
    display: flex;
    gap: 6px;
    margin: 14px 0 10px;
  }
  .view-tab {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
  }
  .view-tab.active {
    background: var(--brass);
    color: var(--on-accent);
    border-color: var(--brass);
    font-weight: 600;
  }

  .campo-container {
    background: linear-gradient(180deg, var(--pitch), var(--pitch-2));
    border-radius: 10px;
    padding: 10px;
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .campo-linha {
    display: flex;
    gap: 4px;
  }
  .campo-linha.compact {
    justify-content: center;
  }
  .campo-linha.compact .campo-zona {
    flex: 0 1 110px;
    min-height: 44px;
  }
  .campo-zona {
    flex: 1;
    min-height: 62px;
    border: 1px dashed rgba(255,255,255,0.35);
    border-radius: 6px;
    padding: 3px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .campo-zona-stack {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .campo-zona-stack .campo-zona {
    flex: 1;
    min-height: 29px;
  }
  .campo-zona-stack .campo-zona .campo-zona-label {
    font-size: 0.52rem;
  }
  .campo-zona.campo-zona-spacer { border-color: transparent; }
  .campo-zona-principais, .campo-zona-secundarias {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .campo-numero {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--brass);
    flex-shrink: 0;
  }
  .campo-zona-label {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.03em;
    color: rgba(255,255,255,0.85);
    text-align: center;
    font-weight: 700;
  }
  .campo-chip {
    background: var(--chalk);
    border-radius: 5px;
    padding: 2px 4px;
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.68rem;
    color: #1C242B;
    cursor: grab;
    border-left: 3px solid transparent;
  }
  .campo-chip.chip-sai { border-left-color: var(--signal-red-fill); }
  .campo-chip.chip-entra { border-left-color: var(--signal-green-fill); }
  .campo-chip.chip-emprestimo { border-left-color: var(--neutral-fill); }
  .campo-chip.chip-reserva {
    background: rgba(240, 242, 244, 0.4);
  }
  .badge.emprestimo { background: var(--neutral-fill); }
  .campo-chip .campo-avatar, .campo-chip .campo-avatar-placeholder {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .campo-chip .campo-avatar-placeholder {
    background: #C7CFD6;
    color: #1C242B;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    font-weight: 700;
  }
  .campo-chip .campo-nome {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .campo-chip .campo-avatar-placeholder.indefinido {
    background: var(--signal-green-fill);
    color: var(--text);
  }
  .campo-chip .campo-nome.reforco-indefinido {
    font-weight: 700;
    color: var(--signal-green-fill);
  }
  .campo-chip-secundaria {
    opacity: 0.55;
    transform: scale(0.9);
    transform-origin: left center;
    border-left: 2px dashed var(--brass) !important;
  }
  .campo-chip-secundaria .campo-avatar,
  .campo-chip-secundaria .campo-avatar-placeholder {
    width: 14px;
    height: 14px;
  }
  .campo-chip-secundaria .campo-nome {
    font-size: 0.6rem;
  }
  .campo-container.campo-detalhada .campo-chip {
    cursor: default;
  }

  .campo-subtabs {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
  const API_BASE = "https://v3.football.api-sports.io";
  const KEY_STORAGE = "apiFootballKey";

  const POSITION_MAP = {
    "Goalkeeper": "GK",
    "Defender": "DF",
    "Midfielder": "MF",
    "Attacker": "AT"
  };
  const GROUP_LABELS = {
    GK: "Guarda-redes",
    DF: "Defesas",
    MF: "Médios",
    AT: "Avançados"
  };
  const GROUP_ORDER = ["GK", "DF", "MF", "AT"];

  const POSITION_GROUPS = [
    { line: "GK", codes: ["GK"] },
    { line: "DF", codes: ["LB", "LWB", "LCB", "CCB", "RCB", "RB", "RWB"] },
    { line: "MF", codes: ["LCDM", "CCDM", "RCDM", "LM", "LCM", "CCM", "RCM", "RM", "LCAM", "CCAM", "RCAM"] },
    { line: "AT", codes: ["LW", "LST", "CST", "RST", "RW"] }
  ];
  const DEFAULT_POS_BY_CATEGORY = { GK: "GK", DF: "CCB", MF: "CCM", AT: "CST" };
  const POSITION_TO_LINE = {};
  POSITION_GROUPS.forEach((g) => g.codes.forEach((c) => { POSITION_TO_LINE[c] = g.line; }));

  function lineOf(code) {
    return POSITION_TO_LINE[code] || "MF";
  }

  const FIELD_ROWS = [
    { label: "Guarda-redes", codes: ["GK"], compact: true },
    { label: "Defesas", codes: [["LWB", "LB"], "LCB", "CCB", "RCB", ["RWB", "RB"]] },
    { label: "Médios defensivos", codes: [null, "LCDM", "CCDM", "RCDM", null] },
    { label: "Médios", codes: ["LM", "LCM", "CCM", "RCM", "RM"] },
    { label: "Médios ofensivos", codes: ["LW", "LCAM", "CCAM", "RCAM", "RW"] },
    { label: "Avançados", codes: [null, "LST", "CST", "RST", null] }
  ];

  function positionSelectHTML(selected) {
    return POSITION_GROUPS.map((g) =>
      '<optgroup label="' + GROUP_LABELS[g.line] + '">' +
      g.codes.map((c) => '<option value="' + c + '"' + (c === selected ? " selected" : "") + '>' + c + '</option>').join("") +
      '</optgroup>'
    ).join("");
  }

  let players = [];
  let openEditorId = null;
  let extraGanhos = [];
  let extraCustos = [];
  let orcamentoInicial = 0;
  let filtroNome = "";

  const keyBlock = document.getElementById("keyBlock");
  const searchBlock = document.getElementById("searchBlock");
  const squadBlock = document.getElementById("squadBlock");

  const apiKeyInput = document.getElementById("apiKeyInput");
  const keyError = document.getElementById("keyError");
  const teamSearchInput = document.getElementById("teamSearchInput");
  const searchStatus = document.getElementById("searchStatus");
  const searchError = document.getElementById("searchError");
  const teamResults = document.getElementById("teamResults");
  const squadClubName = document.getElementById("squadClubName");
  const squadClubLogo = document.getElementById("squadClubLogo");
  const squadStatus = document.getElementById("squadStatus");
  const squadList = document.getElementById("squadList");
  const campoWrap = document.getElementById("campoWrap");
  const campoContainer = document.getElementById("campoContainer");
  const campoSimplesBtn = document.getElementById("campoSimplesBtn");
  const campoDetalhadaBtn = document.getElementById("campoDetalhadaBtn");
  const campoSubtabHint = document.getElementById("campoSubtabHint");
  const tabListaBtn = document.getElementById("tabListaBtn");
  const tabCampoBtn = document.getElementById("tabCampoBtn");
  let campoDetalhada = false;
  const saldoValue = document.getElementById("saldoValue");
  const toggleReforcoBtn = document.getElementById("toggleReforcoBtn");
  const reforcoForm = document.getElementById("reforcoForm");
  const reforcoNome = document.getElementById("reforcoNome");
  const reforcoPosicao = document.getElementById("reforcoPosicao");
  const reforcoValor = document.getElementById("reforcoValor");
  const reforcoEmprestimo = document.getElementById("reforcoEmprestimo");
  reforcoPosicao.innerHTML = positionSelectHTML("CCB");
  const toggleGanhoBtn = document.getElementById("toggleGanhoBtn");
  const ganhoForm = document.getElementById("ganhoForm");
  const ganhoDescricao = document.getElementById("ganhoDescricao");
  const ganhoValor = document.getElementById("ganhoValor");
  const ganhosExtraList = document.getElementById("ganhosExtraList");
  const toggleCustoBtn = document.getElementById("toggleCustoBtn");
  const custoForm = document.getElementById("custoForm");
  const custoDescricao = document.getElementById("custoDescricao");
  const custoValor = document.getElementById("custoValor");
  const custosExtraList = document.getElementById("custosExtraList");
  const orcamentoInicialInput = document.getElementById("orcamentoInicialInput");
  const filtroNomeInput = document.getElementById("filtroNomeInput");
  const exportarStoryBtn = document.getElementById("exportarStoryBtn");
  const copiarLinkBtn = document.getElementById("copiarLinkBtn");
  const corClubeInput = document.getElementById("corClubeInput");
  const guardarAnaliseBtn = document.getElementById("guardarAnaliseBtn");
  const carregarAnaliseBtn = document.getElementById("carregarAnaliseBtn");
  const carregarAnaliseInput = document.getElementById("carregarAnaliseInput");
  const carregarAnaliseError = document.getElementById("carregarAnaliseError");
  const CLUBE_COR_DEFEITO = "#B8955A";
  const AUTO_SAVE_KEY = "diretorDesportivoAutoSave";
  const resumeBanner = document.getElementById("resumeBanner");
  const resumeBannerText = document.getElementById("resumeBannerText");
  const resumeBtn = document.getElementById("resumeBtn");
  const discardResumeBtn = document.getElementById("discardResumeBtn");

  function getKey() {
    return localStorage.getItem(KEY_STORAGE);
  }

  function hexToRgb(hex) {
    hex = hex.replace("#", "");
    if (hex.length === 3) hex = hex.split("").map((c) => c + c).join("");
    const num = parseInt(hex, 16);
    return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
  }

  function rgbToHex(r, g, b) {
    return "#" + [r, g, b].map((v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0")).join("");
  }

  function relativeLuminance(rgb) {
    const srgb = [rgb.r, rgb.g, rgb.b].map((v) => {
      v /= 255;
      return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
    });
    return 0.2126 * srgb[0] + 0.7152 * srgb[1] + 0.0722 * srgb[2];
  }

  function lighten(hex, amount) {
    const { r, g, b } = hexToRgb(hex);
    return rgbToHex(r + (255 - r) * amount, g + (255 - g) * amount, b + (255 - b) * amount);
  }

  function aplicarCorClube(hex) {
    if (!hex) hex = CLUBE_COR_DEFEITO;
    const rgb = hexToRgb(hex);
    const root = document.documentElement.style;
    root.setProperty("--brass", hex);
    root.setProperty("--brass-rgb", rgb.r + ", " + rgb.g + ", " + rgb.b);
    root.setProperty("--brass-2", lighten(hex, 0.25));
    root.setProperty("--on-accent", relativeLuminance(rgb) > 0.4 ? "#0E1A24" : "#EAEDEF");
    corClubeInput.value = hex;
  }

  corClubeInput.addEventListener("input", () => {
    aplicarCorClube(corClubeInput.value);
    autoSave();
  });

  const ANALISE_VERSAO_ATUAL = 1;

  function showToast(mensagem) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = mensagem;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  function construirDadosAnalise() {
    return {
      versao: ANALISE_VERSAO_ATUAL,
      clube: {
        nome: squadClubName.textContent || "",
        logo: squadClubLogo.src || ""
      },
      corDestaque: corClubeInput.value,
      orcamentoInicial: orcamentoInicial,
      jogadores: players,
      ganhosExtra: extraGanhos,
      custosExtra: extraCustos
    };
  }

  function autoSave() {
    if (!players.length) return;
    localStorage.setItem(AUTO_SAVE_KEY, JSON.stringify(construirDadosAnalise()));
  }

  function restaurarAnalise(dados) {
    players = dados.jogadores;
    extraGanhos = Array.isArray(dados.ganhosExtra) ? dados.ganhosExtra : [];
    extraCustos = Array.isArray(dados.custosExtra) ? dados.custosExtra : [];
    orcamentoInicial = parseFloat(dados.orcamentoInicial) || 0;
    orcamentoInicialInput.value = orcamentoInicial || "";
    squadClubName.textContent = (dados.clube && dados.clube.nome) || "";
    squadClubLogo.src = (dados.clube && dados.clube.logo) || "";
    squadClubLogo.style.visibility = squadClubLogo.src ? "visible" : "hidden";
    aplicarCorClube(dados.corDestaque || CLUBE_COR_DEFEITO);
    filtroNome = "";
    filtroNomeInput.value = "";
    renderSquad();
    showSquadScreen();
  }

  function checkAutoSave() {
    const saved = localStorage.getItem(AUTO_SAVE_KEY);
    if (!saved) return;
    try {
      const dados = JSON.parse(saved);
      if (!dados || !Array.isArray(dados.jogadores) || dados.jogadores.length === 0) return;
      const nomeClube = (dados.clube && dados.clube.nome) || "um clube";
      resumeBannerText.textContent = "Tens uma análise por retomar: " + nomeClube;
      resumeBanner.classList.remove("hidden");
      resumeBtn.onclick = () => {
        restaurarAnalise(dados);
        resumeBanner.classList.add("hidden");
        showToast("Análise retomada ✓");
      };
      discardResumeBtn.onclick = () => {
        localStorage.removeItem(AUTO_SAVE_KEY);
        resumeBanner.classList.add("hidden");
      };
    } catch (e) {
      localStorage.removeItem(AUTO_SAVE_KEY);
    }
  }

  function showSearchScreen() {
    keyBlock.classList.add("hidden");
    searchBlock.classList.remove("hidden");
    squadBlock.classList.add("hidden");
  }

  function showKeyScreen() {
    keyBlock.classList.remove("hidden");
    searchBlock.classList.add("hidden");
    squadBlock.classList.add("hidden");
  }

  function showSquadScreen() {
    searchBlock.classList.add("hidden");
    squadBlock.classList.remove("hidden");
  }

  async function apiFetch(path) {
    const key = getKey();
    const res = await fetch(API_BASE + path, {
      headers: { "x-apisports-key": key }
    });
    if (!res.ok) {
      throw new Error("Erro de ligação à API (código " + res.status + ").");
    }
    const data = await res.json();
    const hasErrors = data.errors && (
      (Array.isArray(data.errors) && data.errors.length > 0) ||
      (!Array.isArray(data.errors) && Object.keys(data.errors).length > 0)
    );
    if (hasErrors) {
      const msg = Array.isArray(data.errors) ? data.errors.join(" ") : Object.values(data.errors).join(" ");
      throw new Error(msg || "A API devolveu um erro.");
    }
    return data.response;
  }

  function saveKey() {
    const key = apiKeyInput.value.trim();
    keyError.textContent = "";
    if (!key) {
      keyError.textContent = "Introduz a tua chave da API-Football.";
      return;
    }
    localStorage.setItem(KEY_STORAGE, key);
    showSearchScreen();
  }

  document.getElementById("saveKeyBtn").addEventListener("click", saveKey);
  apiKeyInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") saveKey();
  });

  document.getElementById("changeKeyBtn").addEventListener("click", () => {
    apiKeyInput.value = getKey() || "";
    showKeyScreen();
  });

  document.getElementById("backToSearchBtn").addEventListener("click", () => {
    squadList.innerHTML = "";
    players = [];
    extraGanhos = [];
    extraCustos = [];
    orcamentoInicial = 0;
    orcamentoInicialInput.value = "";
    filtroNome = "";
    filtroNomeInput.value = "";
    aplicarCorClube(CLUBE_COR_DEFEITO);
    carregarAnaliseError.textContent = "";
    showSearchScreen();
  });

  document.getElementById("searchBtn").addEventListener("click", searchTeams);
  teamSearchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") searchTeams();
  });

  async function searchTeams() {
    const term = teamSearchInput.value.trim();
    searchError.textContent = "";
    teamResults.innerHTML = "";
    if (!term) {
      searchError.textContent = "Escreve o nome de um clube.";
      return;
    }
    searchStatus.textContent = "A procurar...";
    try {
      const teams = await apiFetch("/teams?search=" + encodeURIComponent(term));
      searchStatus.textContent = "";
      if (!teams || teams.length === 0) {
        searchError.textContent = "Não foi encontrado nenhum clube com esse nome.";
        return;
      }
      teams.forEach((item) => {
        const t = item.team;
        const div = document.createElement("div");
        div.className = "team-option";
        div.innerHTML =
          '<img src="' + (t.logo || "") + '" onerror="this.style.visibility=\'hidden\'">' +
          '<div><div class="name">' + escapeHtml(t.name) + '</div>' +
          '<div class="country">' + escapeHtml(t.country || "") + '</div></div>';
        div.addEventListener("click", () => loadSquad(t.id, t.name, t.logo));
        teamResults.appendChild(div);
      });
    } catch (err) {
      searchStatus.textContent = "";
      searchError.textContent = "Não foi possível procurar: " + err.message;
    }
  }

  async function loadSquad(teamId, teamName, teamLogo) {
    searchError.textContent = "";
    searchStatus.textContent = "A carregar o plantel...";
    try {
      const squads = await apiFetch("/players/squads?team=" + teamId);
      searchStatus.textContent = "";
      if (!squads || squads.length === 0) {
        searchError.textContent = "Não foi encontrado plantel para este clube.";
        return;
      }
      const rawPlayers = squads[0].players || [];
      players = rawPlayers.map((p) => {
        const categoria = POSITION_MAP[p.position] || "MF";
        return {
          id: p.id,
          name: p.name,
          numero: p.number != null ? p.number : null,
          photo: p.photo,
          posPrincipal: DEFAULT_POS_BY_CATEGORY[categoria] || "CCM",
          posSecundarias: [],
          estado: "fica",
          valor: null,
          clubPct: 100,
          isReforco: false,
          nota: null
        };
      });
      squadClubName.textContent = teamName;
      squadClubLogo.style.visibility = "visible";
      squadClubLogo.src = teamLogo || "";
      extraGanhos = [];
      extraCustos = [];
      orcamentoInicial = 0;
      orcamentoInicialInput.value = "";
      filtroNome = "";
      filtroNomeInput.value = "";
      aplicarCorClube(CLUBE_COR_DEFEITO);
      renderSquad();
      showSquadScreen();
    } catch (err) {
      searchStatus.textContent = "";
      searchError.textContent = "Não foi possível carregar o plantel: " + err.message;
    }
  }

  tabListaBtn.addEventListener("click", () => {
    tabListaBtn.classList.add("active");
    tabCampoBtn.classList.remove("active");
    squadList.classList.remove("hidden");
    campoWrap.classList.add("hidden");
  });

  tabCampoBtn.addEventListener("click", () => {
    tabCampoBtn.classList.add("active");
    tabListaBtn.classList.remove("active");
    campoWrap.classList.remove("hidden");
    squadList.classList.add("hidden");
  });

  function setCampoDetalhada(valor) {
    campoDetalhada = valor;
    campoSimplesBtn.classList.toggle("active", !valor);
    campoDetalhadaBtn.classList.toggle("active", valor);
    campoSubtabHint.textContent = valor
      ? "Mostra também as posições secundárias de cada jogador. Não é possível arrastar nesta vista."
      : "Arrasta os jogadores entre posições. A posição de origem passa a secundária.";
    renderCampo();
  }

  campoSimplesBtn.addEventListener("click", () => setCampoDetalhada(false));
  campoDetalhadaBtn.addEventListener("click", () => setCampoDetalhada(true));

  toggleReforcoBtn.addEventListener("click", () => {
    reforcoForm.classList.toggle("hidden");
  });

  document.getElementById("confirmReforcoBtn").addEventListener("click", () => {
    const nome = reforcoNome.value.trim();
    const valorDigitado = parseFloat(reforcoValor.value);
    const valor = !isNaN(valorDigitado) && valorDigitado >= 0 ? valorDigitado : 0;
    players.push({
      id: "reforco-" + Date.now(),
      name: nome,
      numero: null,
      photo: null,
      posPrincipal: reforcoPosicao.value,
      posSecundarias: [],
      estado: "entra",
      valor: valor,

    const link = document.createElement("a");
    link.download = (squadClubName.textContent || "plantel").trim().replace(/\s+/g, "_") + "_analise.json";

  carregarAnaliseInput.addEventListener("change", () => {
    const file = carregarAnaliseInput.files[0];
    carregarAnaliseInput.value = "";
    if (!file) return;
    carregarAnaliseError.textContent = "";
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const analise = JSON.parse(reader.result);
        if (!analise || !Array.isArray(analise.jogadores)) {
          throw new Error("O ficheiro não parece ser uma análise guardada válida.");
        }
        const versaoMaisRecente = analise.versao && analise.versao > ANALISE_VERSAO_ATUAL;
        restaurarAnalise(analise);
        showToast(versaoMaisRecente
          ? "Análise carregada — ficheiro de uma versão mais recente, alguns dados podem faltar"
          : "Análise carregada ✓");
      } catch (err) {
        carregarAnaliseError.textContent = "Não foi possível ler o ficheiro: " + err.message;
      }
    };
    reader.onerror = () => {
      carregarAnaliseError.textContent = "Não foi possível ler o ficheiro.";
    };
    reader.readAsText(file);
  });

  function computeSaldo() {
    const totalJogadores = players.reduce((total, p) => {
      if (p.estado === "sai") {
        const valor = parseFloat(p.valor) || 0;
        const pct = p.clubPct != null ? parseFloat(p.clubPct) : 100;
        return total + valor * (pct / 100);
      }
      if (p.estado === "entra") {
        const valor = parseFloat(p.valor) || 0;
        return total - valor;
      }
      return total;
    }, 0);
    const totalGanhosExtra = extraGanhos.reduce((total, g) => total + (parseFloat(g.valor) || 0), 0);
    const totalCustosExtra = extraCustos.reduce((total, c) => total + (parseFloat(c.valor) || 0), 0);
    return orcamentoInicial + totalJogadores + totalGanhosExtra - totalCustosExtra;
  }

  function updateSaldoDisplay() {
    const saldo = computeSaldo();
    saldoValue.textContent = saldo.toLocaleString("pt-PT", { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + " M€";
    saldoValue.classList.remove("positivo", "negativo");
    if (saldo > 0) saldoValue.classList.add("positivo");
    if (saldo < 0) saldoValue.classList.add("negativo");
    autoSave();
  }

  function initials(name) {
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str == null ? "" : String(str);
    return div.innerHTML;
  }

  function visiveis() {
    return players.filter((p) => p.estado !== "fora" && p.estado !== "sai" && p.estado !== "emprestado");
  }

  function moverJogadorNoArray(player, matchFn, newIndex) {
    const semPlayer = players.filter((p) => p !== player);
    const subsetIndices = [];
    semPlayer.forEach((p, i) => { if (matchFn(p)) subsetIndices.push(i); });
    let insertAt;
    if (subsetIndices.length === 0) {
      insertAt = semPlayer.length;
    } else if (newIndex >= subsetIndices.length) {
      insertAt = subsetIndices[subsetIndices.length - 1] + 1;
    } else {
      insertAt = subsetIndices[newIndex];
    }
    semPlayer.splice(insertAt, 0, player);
    players = semPlayer;
  }

  function renderGroupRows(container, groupPlayers, matchFn) {
    const rowsWrap = document.createElement("div");
    rowsWrap.className = "group-rows";
    groupPlayers.forEach((player) => rowsWrap.appendChild(renderPlayerRow(player)));
    container.appendChild(rowsWrap);
    Sortable.create(rowsWrap, {
      animation: 150,
      handle: ".drag-handle",
      onEnd: function (evt) {
        const playerId = evt.item.dataset.playerId;
        const player = players.find((p) => String(p.id) === playerId);
        if (player) moverJogadorNoArray(player, matchFn, evt.newIndex);
        renderSquad();
      }
    });
  }

  function correspondeAoFiltro(p) {
    return !filtroNome || p.name.toLowerCase().includes(filtroNome);
  }

  function renderSquad() {
    const emVista = visiveis().filter(correspondeAoFiltro);
    const vendidos = players.filter((p) => p.estado === "sai").filter(correspondeAoFiltro);
    const emprestados = players.filter((p) => p.estado === "emprestado").filter(correspondeAoFiltro);
    const foraDaAnalise = players.filter((p) => p.estado === "fora").filter(correspondeAoFiltro);
    squadStatus.textContent = emVista.length + " jogadores em análise" +
      (vendidos.length > 0 ? " · " + vendidos.length + " vendidos" : "") +
      (emprestados.length > 0 ? " · " + emprestados.length + " emprestados" : "") +
      (foraDaAnalise.length > 0 ? " · " + foraDaAnalise.length + " fora da análise" : "") + ".";
    squadList.innerHTML = "";

    GROUP_ORDER.forEach((linha) => {
      const groupPlayers = emVista.filter((p) => lineOf(p.posPrincipal) === linha);
      if (groupPlayers.length === 0) return;

      const groupDiv = document.createElement("div");
      groupDiv.className = "group";

      const title = document.createElement("p");
      title.className = "group-title " + linha.toLowerCase();
      title.textContent = GROUP_LABELS[linha] + " (" + groupPlayers.length + ")";
      groupDiv.appendChild(title);

      renderGroupRows(groupDiv, groupPlayers, (p) => lineOf(p.posPrincipal) === linha);

      squadList.appendChild(groupDiv);
    });

    if (vendidos.length > 0) {
      const groupDiv = document.createElement("div");
      groupDiv.className = "group vendidos-group";

      const title = document.createElement("p");
      title.className = "group-title";
      title.textContent = "Vendidos (" + vendidos.length + ")";
      groupDiv.appendChild(title);

      renderGroupRows(groupDiv, vendidos, (p) => p.estado === "sai");

      squadList.appendChild(groupDiv);
    }

    if (emprestados.length > 0) {
      const groupDiv = document.createElement("div");
      groupDiv.className = "group emprestados-group";

      const title = document.createElement("p");
      title.className = "group-title";
      title.textContent = "Emprestados (" + emprestados.length + ")";
      groupDiv.appendChild(title);

      renderGroupRows(groupDiv, emprestados, (p) => p.estado === "emprestado");

      squadList.appendChild(groupDiv);
    }

    if (foraDaAnalise.length > 0) {
      const groupDiv = document.createElement("div");
      groupDiv.className = "group fora-group";

      const title = document.createElement("p");
      title.className = "group-title";
      title.textContent = "Fora da análise (" + foraDaAnalise.length + ")";
      groupDiv.appendChild(title);

      renderGroupRows(groupDiv, foraDaAnalise, (p) => p.estado === "fora");

      squadList.appendChild(groupDiv);
    }

    renderGanhosExtra();
    renderCustosExtra();
    updateSaldoDisplay();
    renderCampo();
  }

  function buildCampoZonaSpacer() {
    const zona = document.createElement("div");
    zona.className = "campo-zona campo-zona-spacer";
    return zona;
  }

  function buildCampoZona(code, sub) {
    const emAnalise = visiveis();
    const zona = document.createElement("div");
    zona.className = "campo-zona" + (sub ? " campo-zona-sub" : "");

    const label = document.createElement("div");
    label.className = "campo-zona-label";
    label.textContent = code;
    zona.appendChild(label);

    const principaisWrap = document.createElement("div");
    principaisWrap.className = "campo-zona-principais";
    principaisWrap.dataset.code = code;
    emAnalise
      .filter((p) => p.posPrincipal === code)
      .forEach((player) => principaisWrap.appendChild(renderCampoChip(player, false)));
    zona.appendChild(principaisWrap);

    const sortableOptions = {
      animation: 150,
      onEnd: function (evt) {
        const destCode = evt.to.dataset.code;
        const playerId = evt.item.dataset.playerId;
        const player = players.find((p) => String(p.id) === playerId);
        if (!player || !destCode) { renderSquad(); return; }
        if (destCode !== player.posPrincipal) {
          const anterior = player.posPrincipal;
          player.posPrincipal = destCode;
          if (!player.posSecundarias.includes(anterior)) {
            player.posSecundarias.push(anterior);
          }
          player.posSecundarias = player.posSecundarias.filter((c) => c !== destCode);
        }
        moverJogadorNoArray(player, (p) => p.posPrincipal === destCode, evt.newIndex);
        renderSquad();
      }
    };
    if (!campoDetalhada) sortableOptions.group = "campoGroup";
    Sortable.create(principaisWrap, sortableOptions);

    if (campoDetalhada) {
      const secundarios = emAnalise.filter((p) => p.posPrincipal !== code && p.posSecundarias.includes(code));
      if (secundarios.length > 0) {
        const secundariasWrap = document.createElement("div");
        secundariasWrap.className = "campo-zona-secundarias";
        secundarios.forEach((player) => secundariasWrap.appendChild(renderCampoChip(player, true)));
        zona.appendChild(secundariasWrap);
      }
    }

    return zona;
  }

  function renderCampo() {
    campoContainer.innerHTML = "";
    campoContainer.classList.toggle("campo-detalhada", campoDetalhada);

    FIELD_ROWS.forEach((row) => {
      const linhaDiv = document.createElement("div");
      linhaDiv.className = "campo-linha" + (row.compact ? " compact" : "");

      row.codes.forEach((entry) => {
        if (entry === null) {
          linhaDiv.appendChild(buildCampoZonaSpacer());
        } else if (Array.isArray(entry)) {
          const stack = document.createElement("div");
          stack.className = "campo-zona-stack";
          entry.forEach((code) => stack.appendChild(buildCampoZona(code, true)));
          linhaDiv.appendChild(stack);
        } else {
          linhaDiv.appendChild(buildCampoZona(entry, false));
        }
      });

      campoContainer.appendChild(linhaDiv);
    });
  }

  function renderCampoChip(player, isSecundaria) {
    const nomeIndefinido = player.isReforco && !player.name.trim();
    const chip = document.createElement("div");
    chip.className = "campo-chip" +
      (isSecundaria ? " campo-chip-secundaria" : "") +
      (player.estado === "sai" ? " chip-sai" : player.estado === "entra" ? (player.isEmprestimo ? " chip-emprestimo" : " chip-entra") : "") +
      (player.estado === "reserva" ? " chip-reserva" : "");
    chip.dataset.playerId = String(player.id);

    if (player.numero) {
      const num = document.createElement("span");
      num.className = "campo-numero";
      num.textContent = player.numero;
      chip.appendChild(num);
    }

    if (player.photo) {
      const img = document.createElement("img");
      img.className = "campo-avatar";
      img.src = player.photo;
      img.referrerPolicy = "no-referrer";
      img.onerror = function () {
        const ph = document.createElement("div");
        ph.className = "campo-avatar-placeholder";
        ph.textContent = initials(player.name);
        img.replaceWith(ph);
      };
      chip.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "campo-avatar-placeholder" + (nomeIndefinido ? " indefinido" : "");
      ph.textContent = nomeIndefinido ? "?" : initials(player.name);
      chip.appendChild(ph);
    }

    const nome = document.createElement("span");
    nome.className = "campo-nome" + (nomeIndefinido ? " reforco-indefinido" : "");
    nome.textContent = nomeIndefinido ? "Reforço" : player.name;
    chip.appendChild(nome);

    return chip;
  }

    const nomeIndefinido = player.isReforco && !player.name.trim();
    const row = document.createElement("div");
    row.className = "player" + (player.isReforco ? " reforco-row" : "") + (player.estado === "reserva" ? " reserva-row" : "");
    row.dataset.playerId = String(player.id);

    const rowTop = document.createElement("div");
    rowTop.className = "player-row-top";

    const handle = document.createElement("span");
    handle.className = "drag-handle";
    handle.textContent = "⠿";
    handle.title = "Arrastar para reordenar";
    rowTop.appendChild(handle);

    if (player.photo) {
      const img = document.createElement("img");
      img.className = "avatar";
      img.src = player.photo;
      img.referrerPolicy = "no-referrer";
      img.onerror = function () {
        const ph = document.createElement("div");
        ph.className = "avatar-placeholder";
        ph.textContent = initials(player.name);
        img.replaceWith(ph);
      };
      rowTop.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "avatar-placeholder" + (nomeIndefinido ? " indefinido" : "");
      ph.textContent = nomeIndefinido ? "?" : initials(player.name);
      rowTop.appendChild(ph);
    }

    const nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.value = player.name;
    nameInput.placeholder = player.isReforco ? "Reforço" : "Nome";
    nameInput.className = player.isReforco ? "nome-reforco" : "";
    if (nomeIndefinido) nameInput.classList.add("nome-indefinido");
    nameInput.addEventListener("input", () => {
      player.name = nameInput.value;
      nameInput.classList.toggle("nome-indefinido", player.isReforco && !nameInput.value.trim());
      autoSave();
    });
    rowTop.appendChild(nameInput);

    const numeroWrap = document.createElement("span");
    numeroWrap.className = "numero-wrap";
    numeroWrap.appendChild(document.createTextNode("#"));
    const numeroInput = document.createElement("input");
    numeroInput.type = "number";
    numeroInput.min = "1";
    numeroInput.max = "99";
    numeroInput.placeholder = "nº";
    numeroInput.value = player.numero != null ? player.numero : "";
    numeroInput.addEventListener("input", () => {
      player.numero = numeroInput.value;
      renderCampo();
      autoSave();
    });
    numeroWrap.appendChild(numeroInput);
    rowTop.appendChild(numeroWrap);

    const badge = document.createElement("span");
    badge.className = "badge " + linha.toLowerCase();
    badge.textContent = player.posPrincipal;
    rowTop.appendChild(badge);

    if (player.isReforco) {
      const entraBadge = document.createElement("span");
      entraBadge.className = player.isEmprestimo ? "badge emprestimo" : "badge entra";
      entraBadge.textContent = player.isEmprestimo ? "EMPRÉSTIMO" : "ENTRA";
      rowTop.appendChild(entraBadge);
    }

    if (player.posSecundarias.length > 0) {
      const sec = document.createElement("span");
      sec.className = "secundarias-text";
      sec.textContent = "+ " + player.posSecundarias.join(", ");
      rowTop.appendChild(sec);
    }

    row.appendChild(rowTop);

    const rowBottom = document.createElement("div");
    rowBottom.className = "player-row-bottom";

    const posToggleBtn = document.createElement("button");
    posToggleBtn.type = "button";
    posToggleBtn.className = "pos-toggle-btn";
    posToggleBtn.textContent = "Posições";
    posToggleBtn.addEventListener("click", () => {
      openEditorId = openEditorId === player.id ? null : player.id;
      renderSquad();
    });
    rowBottom.appendChild(posToggleBtn);

    if (player.isReforco) {
      rowBottom.appendChild(renderValorField(player, "entra"));

      const removeBtn = document.createElement("button");
      removeBtn.className = "remove-link";
      removeBtn.textContent = "Remover";
      removeBtn.addEventListener("click", () => {
        players = players.filter((p) => p !== player);
        renderSquad();
      });
      rowBottom.appendChild(removeBtn);
    } else {
      rowBottom.appendChild(renderEstadoSelect(player));
      if (player.estado === "sai") {
        rowBottom.appendChild(renderValorField(player, "sai"));
      }
      if (player.estado === "fora" || player.estado === "emprestado") {
        const restoreBtn = document.createElement("button");
        restoreBtn.className = "remove-link";
        restoreBtn.textContent = "Repor";
        restoreBtn.addEventListener("click", () => {
          player.estado = "fica";
          renderSquad();
        });
        rowBottom.appendChild(restoreBtn);
      }
    }

    const notaInput = document.createElement("input");
    notaInput.type = "text";
    notaInput.className = "nota-input";
    notaInput.placeholder = "Nota (opcional)";
    notaInput.value = player.nota || "";
    notaInput.addEventListener("input", () => {
      player.nota = notaInput.value;
      autoSave();
    });
    rowBottom.appendChild(notaInput);

    row.appendChild(rowBottom);

    if (openEditorId === player.id) {
      row.appendChild(renderPositionEditor(player));
    }

    return row;
  }

  let ultimoCliqueZonaEditor = null;

  function handleMiniZonaClick(player, code) {
    const agora = Date.now();
    const ehDuploClique = ultimoCliqueZonaEditor &&
      ultimoCliqueZonaEditor.player === player &&
      ultimoCliqueZonaEditor.code === code &&
      (agora - ultimoCliqueZonaEditor.time) < 400;

    if (ehDuploClique) {
      player.posPrincipal = code;
      player.posSecundarias = player.posSecundarias.filter((c) => c !== code);
      ultimoCliqueZonaEditor = null;
    } else {
      if (code !== player.posPrincipal) {
        if (player.posSecundarias.includes(code)) {
          player.posSecundarias = player.posSecundarias.filter((c) => c !== code);
        } else {
          player.posSecundarias.push(code);
        }
      }
      ultimoCliqueZonaEditor = { player: player, code: code, time: agora };
    }
    renderSquad();
  }

  function buildMiniZona(player, code) {
    const zona = document.createElement("div");
    zona.className = "mini-campo-zona";
    if (code === player.posPrincipal) {
      zona.classList.add("principal");
    } else if (player.posSecundarias.includes(code)) {
      zona.classList.add("secundaria");
    }
    zona.textContent = code;
    zona.addEventListener("click", () => handleMiniZonaClick(player, code));
    return zona;
  }

  function buildMiniZonaSpacer() {
    const zona = document.createElement("div");
    zona.className = "mini-campo-zona spacer";
    return zona;

    FIELD_ROWS.forEach((row) => {
      const linhaDiv = document.createElement("div");
      linhaDiv.className = "mini-campo-linha" + (row.compact ? " compact" : "");

      row.codes.forEach((entry) => {
        if (entry === null) {
          linhaDiv.appendChild(buildMiniZonaSpacer());
        } else if (Array.isArray(entry)) {
          const stack = document.createElement("div");
          stack.className = "mini-campo-zona-stack";
          entry.forEach((code) => stack.appendChild(buildMiniZona(player, code)));
          linhaDiv.appendChild(stack);
        } else {
          linhaDiv.appendChild(buildMiniZona(player, entry));

      });

      container.appendChild(linhaDiv);
    });

    return container;

  function renderPositionEditor(player) {
    const box = document.createElement("div");
    box.className = "position-editor";

    const hint = document.createElement("p");
    hint.className = "position-editor-hint";
    hint.textContent = "Toca numa posição para marcar secundária. Toque duplo define a principal (atual: " + player.posPrincipal + ").";
    box.appendChild(hint);

    box.appendChild(renderMiniCampo(player));

    const closeBtn = document.createElement("button");
    closeBtn.type = "button";
    closeBtn.className = "secondary";
    closeBtn.textContent = "Fechar";
    closeBtn.addEventListener("click", () => {
      openEditorId = null;
      renderSquad();
    });
    box.appendChild(closeBtn);

    return box;
  }

  function renderEstadoSelect(player) {
    const select = document.createElement("select");
    select.className = "estado-select estado-" + player.estado;
    const opcoes = [
      { estado: "fica", label: "Fica" },
      { estado: "reserva", label: "Reserva" },
      { estado: "sai", label: "Sai" },
      { estado: "emprestado", label: "Emprést." },
      { estado: "fora", label: "Fora" }
    ];
    opcoes.forEach((op) => {
      const opt = document.createElement("option");
      opt.value = op.estado;
      opt.textContent = op.label;
      if (player.estado === op.estado) opt.selected = true;
      select.appendChild(opt);
    });
    select.addEventListener("change", () => {
      player.estado = select.value;
      renderSquad();
    });
    return select;
  }

  function renderValorField(player, tipo) {
    const wrap = document.createElement("span");
    wrap.className = "value-fields";

    const valorInput = document.createElement("input");
    valorInput.type = "number";
    valorInput.min = "0";
    valorInput.step = "0.1";
    valorInput.placeholder = "Valor";
    valorInput.value = player.valor != null ? player.valor : "";
    valorInput.addEventListener("input", () => {
      player.valor = valorInput.value;
      updateSaldoDisplay();
    });
    wrap.appendChild(document.createTextNode("M€"));
    wrap.appendChild(valorInput);

    if (tipo === "sai") {
      const pctInput = document.createElement("input");
      pctInput.type = "number";
      pctInput.min = "0";
      pctInput.max = "100";
      pctInput.value = player.clubPct != null ? player.clubPct : 100;
      pctInput.addEventListener("input", () => {
        player.clubPct = pctInput.value;
        updateSaldoDisplay();
      });
      pctInput.title = "Percentagem do valor que fica no clube";
      wrap.appendChild(document.createTextNode("%"));
      wrap.appendChild(pctInput);
    }

    return wrap;
  }

  const EXPORT_WIDTH = 700;
  const EXPORT_WIDTH_VERTICAL = 480;

  async function imageToDataURL(url) {
    try {
      const res = await fetch(url, { mode: "cors" });
      if (!res.ok) return null;
      const blob = await res.blob();
      return await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(blob);
      });
    } catch (e) {
      return null;
    }
  }

  function construirLinhaTotal(label, valorTexto, corDestaque) {
    const totalRow = document.createElement("div");
    totalRow.style.cssText = "display:flex; justify-content:space-between; gap:8px; padding-top:6px; margin-top:4px; border-top:1px solid " + corDestaque + "; font-weight:700;";
    const totalLabel = document.createElement("span");
    totalLabel.textContent = label;
    const totalValue = document.createElement("span");
    totalValue.style.cssText = "font-family:'IBM Plex Mono', monospace; white-space:nowrap;";
    totalValue.textContent = valorTexto;
    totalRow.appendChild(totalLabel);
    totalRow.appendChild(totalValue);
    return totalRow;
  }

  function construirListaTransferencias(titulo, lista, tipo, corDestaque) {
    const box = document.createElement("div");
    box.style.cssText = "flex:1; background:#1D2C39; border-radius:8px; padding:10px; font-size:11px; font-family:'IBM Plex Sans', Arial, sans-serif; color:#EAEDEF;";

    const titleEl = document.createElement("div");
    titleEl.style.cssText = "font-family:'Big Shoulders Display', Arial, sans-serif; font-weight:700; font-size:13px; letter-spacing:0.03em; text-transform:uppercase; margin-bottom:6px; color:" + corDestaque + ";";
    titleEl.textContent = titulo;
    box.appendChild(titleEl);

    if (lista.length === 0) {
      const vazio = document.createElement("div");
      vazio.style.cssText = "color:#8A9BA8;";
      vazio.textContent = "Nenhum";
      box.appendChild(vazio);
      return box;
    }

    let total = 0;
    lista.forEach((p) => {
      const linha = document.createElement("div");
      linha.style.cssText = "display:flex; justify-content:space-between; gap:8px; padding:3px 0; border-bottom:1px solid #24343F;";
      const nome = document.createElement("span");
      nome.style.cssText = "overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0;";
      nome.textContent = (p.name && p.name.trim() ? p.name : "Reforço") + (tipo === "entra" && p.isEmprestimo ? " (empréstimo)" : "");
      const valorTxt = document.createElement("span");
      valorTxt.style.cssText = "white-space:nowrap; font-family:'IBM Plex Mono', monospace; flex-shrink:0;";
      const valor = parseFloat(p.valor) || 0;
      if (tipo === "sai") {
        const pct = p.clubPct != null ? parseFloat(p.clubPct) : 100;
        const contribuicao = valor * (pct / 100);
        total += contribuicao;
        valorTxt.textContent = contribuicao.toLocaleString("pt-PT", { maximumFractionDigits: 1 }) + "M€";
      } else {
        total -= valor;
        valorTxt.textContent = "-" + valor.toLocaleString("pt-PT", { maximumFractionDigits: 1 }) + "M€";
      }
      linha.appendChild(nome);
      linha.appendChild(valorTxt);
      box.appendChild(linha);
    });

    box.appendChild(construirLinhaTotal("Total", total.toLocaleString("pt-PT", { maximumFractionDigits: 1 }) + "M€", corDestaque));

    return box;
  }

  function construirListaValores(titulo, lista, corDestaque, sinal) {
    const box = document.createElement("div");
    box.style.cssText = "flex:1; background:#1D2C39; border-radius:8px; padding:10px; font-size:11px; font-family:'IBM Plex Sans', Arial, sans-serif; color:#EAEDEF;";

    const titleEl = document.createElement("div");
    titleEl.style.cssText = "font-family:'Big Shoulders Display', Arial, sans-serif; font-weight:700; font-size:13px; letter-spacing:0.03em; text-transform:uppercase; margin-bottom:6px; color:" + corDestaque + ";";
    titleEl.textContent = titulo;
    box.appendChild(titleEl);

    if (lista.length === 0) {
      const vazio = document.createElement("div");
      vazio.style.cssText = "color:#8A9BA8;";
      vazio.textContent = "Nenhum";
      box.appendChild(vazio);
      return box;
    }

    let total = 0;
    lista.forEach((g) => {
      const linha = document.createElement("div");
      linha.style.cssText = "display:flex; justify-content:space-between; gap:8px; padding:3px 0; border-bottom:1px solid #24343F;";
      const desc = document.createElement("span");
      desc.style.cssText = "overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0;";
      desc.textContent = g.descricao;
      const valorTxt = document.createElement("span");
      valorTxt.style.cssText = "white-space:nowrap; font-family:'IBM Plex Mono', monospace; flex-shrink:0;";
      const valor = parseFloat(g.valor) || 0;
      total += valor;
      valorTxt.textContent = sinal + valor.toLocaleString("pt-PT", { maximumFractionDigits: 1 }) + "M€";
      linha.appendChild(desc);
      linha.appendChild(valorTxt);
      box.appendChild(linha);
    });

    box.appendChild(construirLinhaTotal("Total", sinal + total.toLocaleString("pt-PT", { maximumFractionDigits: 1 }) + "M€", corDestaque));

    return box;
  }

  async function construirTemplateExportacao(formatoVertical) {
    const emVista = visiveis();
    const saem = players.filter((p) => p.estado === "sai");
    const entram = players.filter((p) => p.estado === "entra");
    const corDestaque = getComputedStyle(document.documentElement).getPropertyValue("--brass").trim() || "#B8955A";
    const largura = formatoVertical ? EXPORT_WIDTH_VERTICAL : EXPORT_WIDTH;

    const fotosCache = {};
    const logoSrc = squadClubLogo.style.visibility !== "hidden" && squadClubLogo.src ? await imageToDataURL(squadClubLogo.src) : null;
    await Promise.all(
      emVista.filter((p) => p.photo).map(async (p) => {
        fotosCache[p.photo] = await imageToDataURL(p.photo);
      })
    );

    const container = document.createElement("div");
    container.style.cssText = "position:fixed; left:-9999px; top:0; width:" + largura +
      "px; background:#0E1A24; padding:20px; font-family:'IBM Plex Sans', Arial, sans-serif; color:#EAEDEF;";

    const header = document.createElement("div");
    header.style.cssText = "display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; background:#1D2C39; border-radius:10px; padding:14px 16px;";
    const clubeWrap = document.createElement("div");
    clubeWrap.style.cssText = "display:flex; align-items:center; gap:10px;";
    if (logoSrc) {
      const logoImg = document.createElement("img");
      logoImg.src = logoSrc;
      logoImg.style.cssText = "width:36px; height:36px; object-fit:contain; flex-shrink:0;";
      clubeWrap.appendChild(logoImg);
    }
    const nomeClube = document.createElement("div");
    nomeClube.style.cssText = "font-family:'Big Shoulders Display', Arial, sans-serif; font-size:24px; font-weight:700;";
    nomeClube.textContent = squadClubName.textContent || "";
    clubeWrap.appendChild(nomeClube);
    header.appendChild(clubeWrap);

    const saldoWrap = document.createElement("div");
    saldoWrap.style.cssText = "text-align:right;";
    const saldoLabel = document.createElement("div");
    saldoLabel.style.cssText = "font-size:9px; text-transform:uppercase; letter-spacing:0.09em; color:#8A9BA8;";
    saldoLabel.textContent = "Saldo de mercado";
    const saldoEl = document.createElement("div");
    const saldo = computeSaldo();
    saldoEl.style.cssText = "font-family:'IBM Plex Mono', monospace; font-size:20px; font-weight:600; color:" +
      (saldo > 0 ? "#4CAF7D" : saldo < 0 ? "#E07A6D" : "#EAEDEF") + ";";
    saldoEl.textContent = saldo.toLocaleString("pt-PT", { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + " M€";
    saldoWrap.appendChild(saldoLabel);
    saldoWrap.appendChild(saldoEl);
    header.appendChild(saldoWrap);
    container.appendChild(header);

    const pitch = document.createElement("div");
    pitch.style.cssText = "background:linear-gradient(180deg, #1F6F45, #123B26); border-radius:10px; padding:10px; display:flex; flex-direction:column-reverse; gap:4px;";

    function buildExportChip(player, isSecundaria) {
      const nomeIndefinido = player.isReforco && !player.name.trim();
      const fundoChip = player.estado === "reserva" ? "rgba(240,242,244,0.4)" : "#F0F2F4";
      const corBorda = isSecundaria ? corDestaque :
        player.estado === "entra" ? (player.isEmprestimo ? "#3B4956" : "#1F7A50") : "transparent";
      const chip = document.createElement("div");
      chip.style.cssText = "background:" + fundoChip + "; color:#1C242B; border-radius:5px; padding:2px 4px; display:flex; align-items:center; gap:3px; font-size:" + (isSecundaria ? "9px" : "10px") + "; opacity:" + (isSecundaria ? "0.55" : "1") + "; border-left:3px solid " + corBorda + ";" +
        (isSecundaria ? " border-left-style:dashed;" : "");

      if (player.numero) {
        const num = document.createElement("span");
        num.style.cssText = "font-family:'IBM Plex Mono', monospace; font-size:8px; font-weight:600; color:" + corDestaque + "; flex-shrink:0;";
        num.textContent = player.numero;
        chip.appendChild(num);
      }

      if (player.photo && fotosCache[player.photo]) {
        const img = document.createElement("img");
        img.src = fotosCache[player.photo];
        img.style.cssText = "width:" + (isSecundaria ? "13px" : "16px") + "; height:" + (isSecundaria ? "13px" : "16px") + "; border-radius:50%; object-fit:cover; flex-shrink:0;";
        chip.appendChild(img);
      } else {
        const ph = document.createElement("div");
        ph.style.cssText = "width:" + (isSecundaria ? "13px" : "16px") + "; height:" + (isSecundaria ? "13px" : "16px") + "; border-radius:50%; background:" + (nomeIndefinido ? "#1F7A50" : "#C7CFD6") + "; color:" + (nomeIndefinido ? "#EAEDEF" : "#1C242B") + "; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; flex-shrink:0;";
        ph.textContent = nomeIndefinido ? "?" : initials(player.name);
        chip.appendChild(ph);
      }

      const nome = document.createElement("span");
      nome.style.cssText = "overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" + (nomeIndefinido ? " font-weight:700; color:#1F7A50;" : "");
      nome.textContent = nomeIndefinido ? "Reforço" : player.name;
      chip.appendChild(nome);

      return chip;
    }

    function buildExportZona(code, sub) {
      const zona = document.createElement("div");
      zona.style.cssText = "flex:1; min-height:" + (sub ? "27px" : "56px") + "; border:1px dashed rgba(255,255,255,0.35); border-radius:6px; padding:3px; display:flex; flex-direction:column; gap:3px;";

      const label = document.createElement("div");
      label.style.cssText = "font-family:'Big Shoulders Display', Arial, sans-serif; font-size:" + (sub ? "7px" : "9px") + "; color:rgba(255,255,255,0.85); text-align:center; font-weight:700;";
      label.textContent = code;
      zona.appendChild(label);

      emVista.filter((p) => p.posPrincipal === code).forEach((player) => {
        zona.appendChild(buildExportChip(player, false));
      });

      if (campoDetalhada) {
        emVista.filter((p) => p.posPrincipal !== code && p.posSecundarias.includes(code)).forEach((player) => {
          zona.appendChild(buildExportChip(player, true));
        });
      }

      return zona;
    }

    function buildExportZonaSpacer() {
      const zona = document.createElement("div");
      zona.style.cssText = "flex:1;";
      return zona;
    }

    FIELD_ROWS.forEach((row) => {
      const linhaDiv = document.createElement("div");
      linhaDiv.style.cssText = "display:flex; gap:4px;" + (row.compact ? " justify-content:center;" : "");

      row.codes.forEach((entry) => {
        if (entry === null) {
          linhaDiv.appendChild(buildExportZonaSpacer());
        } else if (Array.isArray(entry)) {
          const stack = document.createElement("div");
          stack.style.cssText = "flex:1; display:flex; flex-direction:column; gap:3px;";
          entry.forEach((code) => stack.appendChild(buildExportZona(code, true)));
          linhaDiv.appendChild(stack);
        } else {
          const zona = buildExportZona(entry, false);
          if (row.compact) zona.style.flex = "0 1 100px";
          linhaDiv.appendChild(zona);
        }
      });

      pitch.appendChild(linhaDiv);
    });
    container.appendChild(pitch);

    const listas = document.createElement("div");
    listas.style.cssText = "display:flex; gap:16px; margin-top:14px;" + (formatoVertical ? " flex-direction:column;" : "");
    listas.appendChild(construirListaTransferencias("Saem", saem, "sai", corDestaque));
    listas.appendChild(construirListaTransferencias("Entram", entram, "entra", corDestaque));
    listas.appendChild(construirListaValores("Outros ganhos", extraGanhos, corDestaque, "+"));
    listas.appendChild(construirListaValores("Outros custos", extraCustos, corDestaque, "-"));
    container.appendChild(listas);

    const assinatura = document.createElement("div");
    assinatura.style.cssText = "text-align:center; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:#5B6B7A; margin-top:14px;";
    assinatura.textContent = "Janela Aberta";
    container.appendChild(assinatura);

    return container;
  }

  async function exportarImagem(exportBtn, formatoVertical, sufixoFicheiro) {
    const textoOriginal = exportBtn.textContent;
    exportBtn.disabled = true;
    exportBtn.textContent = "A gerar imagem...";
    let template = null;
    try {
      template = await construirTemplateExportacao(formatoVertical);
      document.body.appendChild(template);
      const larguraCaptura = template.scrollWidth;
      const alturaCaptura = template.scrollHeight;
      const canvas = await html2canvas(template, {
        backgroundColor: "#0E1A24",
        scale: 2,
        width: larguraCaptura,
        height: alturaCaptura,
        windowWidth: larguraCaptura,
        windowHeight: alturaCaptura
      });
      const link = document.createElement("a");
      link.download = (squadClubName.textContent || "plantel").trim().replace(/\s+/g, "_") + sufixoFicheiro + ".png";
      link.href = canvas.toDataURL("image/png");
      link.click();
      showToast("Imagem descarregada ✓");
    } catch (err) {
      alert("Não foi possível gerar a imagem: " + err.message);
    } finally {
      if (template) template.remove();
      exportBtn.disabled = false;
      exportBtn.textContent = textoOriginal;
    }
  }

  document.getElementById("exportarImagemBtn").addEventListener("click", (e) => {
    exportarImagem(e.currentTarget, false, "_janela-aberta");
  });

  exportarStoryBtn.addEventListener("click", (e) => {
    exportarImagem(e.currentTarget, true, "_janela-aberta_story");
  });

  function codificarEstado(obj) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  }

  function descodificarEstado(str) {
    return JSON.parse(decodeURIComponent(escape(atob(str))));
  }

  copiarLinkBtn.addEventListener("click", async () => {
    const dados = construirDadosAnalise();
    const link = location.origin + location.pathname + "#dados=" + codificarEstado(dados);
    try {
      await navigator.clipboard.writeText(link);
      showToast("Link copiado ✓");
    } catch (e) {
      prompt("Copia o link manualmente:", link);
    }
  });

  function carregarEstadoDoLink() {
    const hash = location.hash;
    const marcador = "#dados=";
    if (!hash.startsWith(marcador)) return false;
    try {
      const dados = descodificarEstado(hash.slice(marcador.length));
      if (!dados || !Array.isArray(dados.jogadores)) return false;
      history.replaceState(null, "", location.pathname + location.search);
      showSearchScreen();
      restaurarAnalise(dados);
      showToast("Cenário partilhado carregado ✓");
      return true;
    } catch (e) {
      return false;
    }
  }

  // Arranque
  if (getKey()) {
    showSearchScreen();
  } else {
    showKeyScreen();
  }
  if (!carregarEstadoDoLink()) {
    checkAutoSave();
  }
</script>
