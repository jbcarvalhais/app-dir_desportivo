<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diretor Desportivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E1A24;
    --card: #16232F;
    --surface: #1D2C39;
    --text: #EAEDEF;
    --muted: #8A9BA8;
    --border: #24343F;

    --brass: #B8955A;
    --brass-2: #D4B67E;
    --brass-rgb: 184, 149, 90;

    --pitch: #1F6F45;
    --pitch-2: #123B26;

    --gk: #B8955A;
    --df: #35506A;
    --mf: #4A6140;
    --at: #8C5423;

    --signal-red: #E07A6D;
    --signal-red-fill: #A83B2E;
    --signal-green: #4CAF7D;
    --signal-green-fill: #1F7A50;
    --neutral-fill: #3B4956;

    --chalk: #F0F2F4;

    --font-display: 'Big Shoulders Display', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', 'IBM Plex Sans', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body), -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px;
  }
  header h1 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--brass);
    font-size: 1.5rem;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 18px;
  }
  section h2 {
    margin-top: 0;
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: 0.01em;
    font-size: 1.2rem;
    color: var(--text);
  }
  label {
    display: block;
    font-size: 0.9rem;
    margin-bottom: 6px;
    color: var(--muted);
  }
  input[type="text"], input[type="password"], input[type="number"] {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.95rem;
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-body);
  }
  input::placeholder { color: var(--muted); opacity: 1; }
  input[type="number"] { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .row > div { flex: 1; }
  button {
    background: var(--brass);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 9px 16px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: var(--brass-2); }
  button.secondary {
    background: transparent;
    color: var(--brass);
    border: 1px solid var(--brass);
  }
  button.secondary:hover { background: rgba(var(--brass-rgb), 0.14); }
  button:disabled { background: var(--neutral-fill); color: var(--muted); cursor: default; }
  .hint {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 8px;
  }
  .error {
    color: var(--signal-red);
    font-size: 0.9rem;
    margin-top: 8px;
  }
  .status {
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 8px;
  }
  .team-results {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .team-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    background: var(--surface);
  }
  .team-option:hover { background: rgba(var(--brass-rgb), 0.14); }
  .team-option img { width: 28px; height: 28px; object-fit: contain; }
  .team-option .name { font-weight: 600; }
  .team-option .country { color: var(--muted); font-size: 0.85rem; }

  .hidden { display: none !important; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .masthead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .masthead-club { display: flex; align-items: center; gap: 12px; }
  .club-crest { width: 44px; height: 44px; object-fit: contain; flex-shrink: 0; }
  .masthead-club .club-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.6rem;
    letter-spacing: 0.01em;
    color: var(--text);
  }
  .masthead-saldo { text-align: right; }
  .masthead-saldo .saldo-label {
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .masthead-saldo .saldo-value {
    font-family: var(--font-mono);
    font-size: 1.7rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .masthead-saldo .saldo-value.positivo { color: var(--signal-green); }
  .masthead-saldo .saldo-value.negativo { color: var(--signal-red); }

  .group {
    margin-bottom: 20px;
  }
  .group-title {
    font-family: var(--font-display);
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 8px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--border);
  }
  .group-title.gk { border-color: var(--gk); }
  .group-title.df { border-color: var(--df); }
  .group-title.mf { border-color: var(--mf); }
  .group-title.at { border-color: var(--at); }

  .player {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
  }
  .player:last-child { border-bottom: none; }
  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface);
  }
  .avatar-placeholder {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--surface);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
  }
  .player-fields {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .player-fields input[type="text"] {
    width: auto;
    min-width: 120px;
    flex: 1;
  }
  .player-fields input[type="number"] {
    width: 58px;
  }
  .age-wrap {
    display: flex;
    align-items: center;
    gap: 3px;
    color: var(--muted);
    font-size: 0.9rem;
    font-family: var(--font-mono);
  }
  .badge {
    font-family: var(--font-display);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 2px 7px;
    border-radius: 4px;
    color: var(--text);
  }
  .badge.gk { background: var(--gk); color: var(--bg); }
  .badge.df { background: var(--df); }
  .badge.mf { background: var(--mf); }
  .badge.at { background: var(--at); }
  .badge.entra { background: var(--signal-green-fill); }
  .badge.fora { background: var(--neutral-fill); }

  .pill {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .pill:hover { background: var(--border); }
  .pill.active { color: var(--text); border-color: transparent; }
  .pill.active.fica { background: var(--neutral-fill); }
  .pill.active.sai { background: var(--signal-red-fill); }
  .pill.active.fora { background: var(--neutral-fill); }
  .pills { display: flex; gap: 4px; }

  .value-fields {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .value-fields input[type="number"] { width: 64px; }

  .remove-link {
    background: none;
    border: none;
    color: var(--signal-red);
    font-size: 0.8rem;
    padding: 2px 4px;
    text-decoration: underline;
  }
  .remove-link:hover { background: none; color: var(--signal-red-fill); }

  .fora-group .player, .vendidos-group .player { opacity: 0.7; }

  .reforco-form {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-top: 10px;
    padding: 10px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
  }
  .reforco-form > div { flex: 1; min-width: 100px; }
  .reforco-form select {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.95rem;
    background: var(--card);
    color: var(--text);
  }

  .secundarias-text {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .pos-toggle-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.78rem;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .pos-toggle-btn:hover { background: var(--surface); }

  .position-editor {
    flex-basis: 100%;
    margin-top: 6px;
    padding: 10px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
  }
  .position-editor .campo {
    margin-bottom: 8px;
  }
  .position-editor .campo-label {
    display: block;
    color: var(--muted);
    margin-bottom: 4px;
    font-size: 0.8rem;
  }
  .position-editor select {
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
    background: var(--card);
    color: var(--text);
  }
  .position-editor .linha-checkboxes {
    margin-bottom: 6px;
  }
  .position-editor .linha-checkboxes .linha-nome {
    font-weight: 600;
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
  }
  .position-editor label.chk {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    margin-right: 10px;
    font-size: 0.85rem;
  }
  .position-editor label.chk.disabled { color: #4E5C68; }

  .view-tabs {
    display: flex;
    gap: 6px;
    margin: 14px 0 10px;
  }
  .view-tab {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
  }
  .view-tab.active {
    background: var(--brass);
    color: var(--bg);
    border-color: var(--brass);
    font-weight: 600;
  }

  .campo-container {
    background: linear-gradient(180deg, var(--pitch), var(--pitch-2));
    border-radius: 10px;
    padding: 10px;
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
  }
  .campo-linha {
    display: flex;
    gap: 4px;
  }
  .campo-zona {
    flex: 1;
    min-height: 62px;
    border: 1px dashed rgba(255,255,255,0.35);
    border-radius: 6px;
    padding: 3px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .campo-zona-label {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.03em;
    color: rgba(255,255,255,0.85);
    text-align: center;
    font-weight: 700;
  }
  .campo-chip {
    background: var(--chalk);
    border-radius: 5px;
    padding: 2px 4px;
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.68rem;
    color: #1C242B;
    cursor: grab;
    border-left: 3px solid transparent;
  }
  .campo-chip.chip-sai { border-left-color: var(--signal-red-fill); }
  .campo-chip.chip-entra { border-left-color: var(--signal-green-fill); }
  .campo-chip .campo-avatar, .campo-chip .campo-avatar-placeholder {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .campo-chip .campo-avatar-placeholder {
    background: #C7CFD6;
    color: #1C242B;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    font-weight: 700;
  }
  .campo-chip .campo-nome {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <h1>Diretor Desportivo</h1>
</header>

<main>

  <section id="keyBlock">
    <h2>Chave da API-Football</h2>
    <label for="apiKeyInput">A tua chave fica guardada só neste browser (nunca é enviada a nenhum servidor nosso).</label>
    <div class="row">
      <div><input type="text" autocomplete="off" id="apiKeyInput" placeholder="Cola aqui a tua chave da API-Football"></div>
      <button id="saveKeyBtn">Guardar chave</button>
    </div>
    <p class="error" id="keyError"></p>
  </section>

  <section id="searchBlock" class="hidden">
    <div class="top-bar">
      <h2>Procurar clube</h2>
      <button class="secondary" id="changeKeyBtn">Trocar chave</button>
    </div>
    <div class="row">
      <div><input type="text" id="teamSearchInput" placeholder="Ex.: Benfica"></div>
      <button id="searchBtn">Procurar</button>
    </div>
    <p class="status" id="searchStatus"></p>
    <p class="error" id="searchError"></p>
    <div class="team-results" id="teamResults"></div>
  </section>

  <section id="squadBlock" class="hidden">
    <div class="top-bar" style="justify-content: flex-end;">
      <button class="secondary" id="backToSearchBtn">Procurar outro clube</button>
    </div>
    <div class="masthead">
      <div class="masthead-club">
        <img id="squadClubLogo" class="club-crest" src="" alt="" onerror="this.style.visibility='hidden'">
        <span class="club-name" id="squadClubName"></span>
      </div>
      <div class="masthead-saldo">
        <span class="saldo-label">Saldo de mercado</span>
        <span class="saldo-value" id="saldoValue">0,0 M€</span>
      </div>
    </div>
    <p class="status" id="squadStatus"></p>
    <div class="row">
      <button class="secondary" id="toggleReforcoBtn">+ Adicionar reforço</button>
    </div>
    <div class="reforco-form hidden" id="reforcoForm">
      <div><input type="text" id="reforcoNome" placeholder="Nome do reforço"></div>
      <div>
        <select id="reforcoPosicao"></select>
      </div>
      <div><input type="number" id="reforcoValor" placeholder="Valor (M€)" min="0" step="0.1"></div>
      <button id="confirmReforcoBtn">Adicionar</button>
    </div>

    <div class="view-tabs">
      <button class="view-tab active" id="tabListaBtn">Lista</button>
      <button class="view-tab" id="tabCampoBtn">Campo</button>
      <button class="secondary" id="exportarImagemBtn" style="margin-left: auto;">Exportar imagem</button>
    </div>

    <div id="squadList"></div>
    <div id="campoContainer" class="campo-container hidden"></div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
  const API_BASE = "https://v3.football.api-sports.io";
  const KEY_STORAGE = "apiFootballKey";

  const POSITION_MAP = {
    "Goalkeeper": "GK",
    "Defender": "DF",
    "Midfielder": "MF",
    "Attacker": "AT"
  };
  const GROUP_LABELS = {
    GK: "Guarda-redes",
    DF: "Defesas",
    MF: "Médios",
    AT: "Avançados"
  };
  const GROUP_ORDER = ["GK", "DF", "MF", "AT"];

  const POSITION_GROUPS = [
    { line: "GK", codes: ["GK"] },
    { line: "DF", codes: ["LB", "LWB", "LCB", "CCB", "RCB", "RB", "RWB"] },
    { line: "MF", codes: ["LCDM", "CCDM", "RCDM", "LM", "LCM", "CCM", "RCM", "RM", "LCAM", "CCAM", "RCAM"] },
    { line: "AT", codes: ["LW", "LST", "CST", "RST", "RW"] }
  ];
  const DEFAULT_POS_BY_CATEGORY = { GK: "GK", DF: "CCB", MF: "CCM", AT: "CST" };
  const POSITION_TO_LINE = {};
  POSITION_GROUPS.forEach((g) => g.codes.forEach((c) => { POSITION_TO_LINE[c] = g.line; }));

  function lineOf(code) {
    return POSITION_TO_LINE[code] || "MF";
  }

  const FIELD_ROWS = [
    { label: "Guarda-redes", codes: ["GK"] },
    { label: "Defesas", codes: ["LWB", "LB", "LCB", "CCB", "RCB", "RB", "RWB"] },
    { label: "Médios defensivos", codes: ["LCDM", "CCDM", "RCDM"] },
    { label: "Médios", codes: ["LM", "LCM", "CCM", "RCM", "RM"] },
    { label: "Médios ofensivos", codes: ["LCAM", "CCAM", "RCAM"] },
    { label: "Avançados", codes: ["LW", "LST", "CST", "RST", "RW"] }
  ];

  function positionSelectHTML(selected) {
    return POSITION_GROUPS.map((g) =>
      '<optgroup label="' + GROUP_LABELS[g.line] + '">' +
      g.codes.map((c) => '<option value="' + c + '"' + (c === selected ? " selected" : "") + '>' + c + '</option>').join("") +
      '</optgroup>'
    ).join("");
  }

  let players = [];
  let openEditorId = null;

  const keyBlock = document.getElementById("keyBlock");
  const searchBlock = document.getElementById("searchBlock");
  const squadBlock = document.getElementById("squadBlock");

  const apiKeyInput = document.getElementById("apiKeyInput");
  const keyError = document.getElementById("keyError");
  const teamSearchInput = document.getElementById("teamSearchInput");
  const searchStatus = document.getElementById("searchStatus");
  const searchError = document.getElementById("searchError");
  const teamResults = document.getElementById("teamResults");
  const squadClubName = document.getElementById("squadClubName");
  const squadClubLogo = document.getElementById("squadClubLogo");
  const squadStatus = document.getElementById("squadStatus");
  const squadList = document.getElementById("squadList");
  const campoContainer = document.getElementById("campoContainer");
  const tabListaBtn = document.getElementById("tabListaBtn");
  const tabCampoBtn = document.getElementById("tabCampoBtn");
  const saldoValue = document.getElementById("saldoValue");
  const toggleReforcoBtn = document.getElementById("toggleReforcoBtn");
  const reforcoForm = document.getElementById("reforcoForm");
  const reforcoNome = document.getElementById("reforcoNome");
  const reforcoPosicao = document.getElementById("reforcoPosicao");
  const reforcoValor = document.getElementById("reforcoValor");
  reforcoPosicao.innerHTML = positionSelectHTML("CCB");

  function getKey() {
    return localStorage.getItem(KEY_STORAGE);
  }

  function showSearchScreen() {
    keyBlock.classList.add("hidden");
    searchBlock.classList.remove("hidden");
    squadBlock.classList.add("hidden");
  }

  function showKeyScreen() {
    keyBlock.classList.remove("hidden");
    searchBlock.classList.add("hidden");
    squadBlock.classList.add("hidden");
  }

  function showSquadScreen() {
    searchBlock.classList.add("hidden");
    squadBlock.classList.remove("hidden");
  }

  async function apiFetch(path) {
    const key = getKey();
    const res = await fetch(API_BASE + path, {
      headers: { "x-apisports-key": key }
    });
    if (!res.ok) {
      throw new Error("Erro de ligação à API (código " + res.status + ").");
    }
    const data = await res.json();
    const hasErrors = data.errors && (
      (Array.isArray(data.errors) && data.errors.length > 0) ||
      (!Array.isArray(data.errors) && Object.keys(data.errors).length > 0)
    );
    if (hasErrors) {
      const msg = Array.isArray(data.errors) ? data.errors.join(" ") : Object.values(data.errors).join(" ");
      throw new Error(msg || "A API devolveu um erro.");
    }
    return data.response;
  }

  function saveKey() {
    const key = apiKeyInput.value.trim();
    keyError.textContent = "";
    if (!key) {
      keyError.textContent = "Introduz a tua chave da API-Football.";
      return;
    }
    localStorage.setItem(KEY_STORAGE, key);
    showSearchScreen();
  }

  document.getElementById("saveKeyBtn").addEventListener("click", saveKey);
  apiKeyInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") saveKey();
  });

  document.getElementById("changeKeyBtn").addEventListener("click", () => {
    apiKeyInput.value = getKey() || "";
    showKeyScreen();
  });

  document.getElementById("backToSearchBtn").addEventListener("click", () => {
    squadList.innerHTML = "";
    players = [];
    showSearchScreen();
  });

  document.getElementById("searchBtn").addEventListener("click", searchTeams);
  teamSearchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") searchTeams();
  });

  async function searchTeams() {
    const term = teamSearchInput.value.trim();
    searchError.textContent = "";
    teamResults.innerHTML = "";
    if (!term) {
      searchError.textContent = "Escreve o nome de um clube.";
      return;
    }
    searchStatus.textContent = "A procurar...";
    try {
      const teams = await apiFetch("/teams?search=" + encodeURIComponent(term));
      searchStatus.textContent = "";
      if (!teams || teams.length === 0) {
        searchError.textContent = "Não foi encontrado nenhum clube com esse nome.";
        return;
      }
      teams.forEach((item) => {
        const t = item.team;
        const div = document.createElement("div");
        div.className = "team-option";
        div.innerHTML =
          '<img src="' + (t.logo || "") + '" onerror="this.style.visibility=\'hidden\'">' +
          '<div><div class="name">' + escapeHtml(t.name) + '</div>' +
          '<div class="country">' + escapeHtml(t.country || "") + '</div></div>';
        div.addEventListener("click", () => loadSquad(t.id, t.name, t.logo));
        teamResults.appendChild(div);
      });
    } catch (err) {
      searchStatus.textContent = "";
      searchError.textContent = "Não foi possível procurar: " + err.message;
    }
  }

  async function loadSquad(teamId, teamName, teamLogo) {
    searchError.textContent = "";
    searchStatus.textContent = "A carregar o plantel...";
    try {
      const squads = await apiFetch("/players/squads?team=" + teamId);
      searchStatus.textContent = "";
      if (!squads || squads.length === 0) {
        searchError.textContent = "Não foi encontrado plantel para este clube.";
        return;
      }
      const rawPlayers = squads[0].players || [];
      players = rawPlayers.map((p) => {
        const categoria = POSITION_MAP[p.position] || "MF";
        return {
          id: p.id,
          name: p.name,
          age: p.age,
          photo: p.photo,
          posPrincipal: DEFAULT_POS_BY_CATEGORY[categoria] || "CCM",
          posSecundarias: [],
          estado: "fica",
          valor: null,
          clubPct: 100,
          isReforco: false
        };
      });
      squadClubName.textContent = teamName;
      squadClubLogo.style.visibility = "visible";
      squadClubLogo.src = teamLogo || "";
      renderSquad();
      showSquadScreen();
    } catch (err) {
      searchStatus.textContent = "";
      searchError.textContent = "Não foi possível carregar o plantel: " + err.message;
    }
  }

  tabListaBtn.addEventListener("click", () => {
    tabListaBtn.classList.add("active");
    tabCampoBtn.classList.remove("active");
    squadList.classList.remove("hidden");
    campoContainer.classList.add("hidden");
  });

  tabCampoBtn.addEventListener("click", () => {
    tabCampoBtn.classList.add("active");
    tabListaBtn.classList.remove("active");
    campoContainer.classList.remove("hidden");
    squadList.classList.add("hidden");
  });

  toggleReforcoBtn.addEventListener("click", () => {
    reforcoForm.classList.toggle("hidden");
  });

  document.getElementById("confirmReforcoBtn").addEventListener("click", () => {
    const nome = reforcoNome.value.trim();
    const valor = parseFloat(reforcoValor.value);
    if (!nome) {
      alert("Escreve o nome do reforço.");
      return;
    }
    if (isNaN(valor) || valor < 0) {
      alert("Introduz um valor válido para o reforço.");
      return;
    }
    players.push({
      id: "reforco-" + Date.now(),
      name: nome,
      age: null,
      photo: null,
      posPrincipal: reforcoPosicao.value,
      posSecundarias: [],
      estado: "entra",
      valor: valor,
      clubPct: 100,
      isReforco: true
    });
    reforcoNome.value = "";
    reforcoValor.value = "";
    reforcoForm.classList.add("hidden");
    renderSquad();
  });

  function computeSaldo() {
    return players.reduce((total, p) => {
      if (p.estado === "sai") {
        const valor = parseFloat(p.valor) || 0;
        const pct = p.clubPct != null ? parseFloat(p.clubPct) : 100;
        return total + valor * (pct / 100);
      }
      if (p.estado === "entra") {
        const valor = parseFloat(p.valor) || 0;
        return total - valor;
      }
      return total;
    }, 0);
  }

  function updateSaldoDisplay() {
    const saldo = computeSaldo();
    saldoValue.textContent = saldo.toLocaleString("pt-PT", { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + " M€";
    saldoValue.classList.remove("positivo", "negativo");
    if (saldo > 0) saldoValue.classList.add("positivo");
    if (saldo < 0) saldoValue.classList.add("negativo");
  }

  function initials(name) {
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str == null ? "" : String(str);
    return div.innerHTML;
  }

  function visiveis() {
    return players.filter((p) => p.estado !== "fora" && p.estado !== "sai");
  }

  function renderSquad() {
    const emVista = visiveis();
    const vendidos = players.filter((p) => p.estado === "sai");
    const foraDaAnalise = players.filter((p) => p.estado === "fora");
    squadStatus.textContent = emVista.length + " jogadores em análise" +
      (vendidos.length > 0 ? " · " + vendidos.length + " vendidos" : "") +
      (foraDaAnalise.length > 0 ? " · " + foraDaAnalise.length + " fora da análise" : "") + ".";
    squadList.innerHTML = "";

    GROUP_ORDER.forEach((linha) => {
      const groupPlayers = emVista.filter((p) => lineOf(p.posPrincipal) === linha);
      if (groupPlayers.length === 0) return;

      const groupDiv = document.createElement("div");
      groupDiv.className = "group";

      const title = document.createElement("p");
      title.className = "group-title " + linha.toLowerCase();
      title.textContent = GROUP_LABELS[linha] + " (" + groupPlayers.length + ")";
      groupDiv.appendChild(title);

      groupPlayers.forEach((player) => {
        groupDiv.appendChild(renderPlayerRow(player));
      });

      squadList.appendChild(groupDiv);
    });

    if (vendidos.length > 0) {
      const groupDiv = document.createElement("div");
      groupDiv.className = "group vendidos-group";

      const title = document.createElement("p");
      title.className = "group-title";
      title.textContent = "Vendidos (" + vendidos.length + ")";
      groupDiv.appendChild(title);

      vendidos.forEach((player) => {
        groupDiv.appendChild(renderPlayerRow(player));
      });

      squadList.appendChild(groupDiv);
    }

    if (foraDaAnalise.length > 0) {
      const groupDiv = document.createElement("div");
      groupDiv.className = "group fora-group";

      const title = document.createElement("p");
      title.className = "group-title";
      title.textContent = "Fora da análise (" + foraDaAnalise.length + ")";
      groupDiv.appendChild(title);

      foraDaAnalise.forEach((player) => {
        groupDiv.appendChild(renderPlayerRow(player));
      });

      squadList.appendChild(groupDiv);
    }

    updateSaldoDisplay();
    renderCampo();
  }

  function renderCampo() {
    const emAnalise = visiveis();
    campoContainer.innerHTML = "";

    FIELD_ROWS.forEach((row) => {
      const linhaDiv = document.createElement("div");
      linhaDiv.className = "campo-linha";

      row.codes.forEach((code) => {
        const zona = document.createElement("div");
        zona.className = "campo-zona";
        zona.dataset.code = code;

        const label = document.createElement("div");
        label.className = "campo-zona-label";
        label.textContent = code;
        zona.appendChild(label);

        emAnalise
          .filter((p) => p.posPrincipal === code)
          .forEach((player) => zona.appendChild(renderCampoChip(player)));

        linhaDiv.appendChild(zona);

        Sortable.create(zona, {
          group: "campoGroup",
          animation: 150,
          onEnd: function (evt) {
            const destCode = evt.to.dataset.code;
            const playerId = evt.item.dataset.playerId;
            const player = players.find((p) => String(p.id) === playerId);
            if (player && destCode) {
              player.posPrincipal = destCode;
              player.posSecundarias = player.posSecundarias.filter((c) => c !== destCode);
            }
            renderSquad();
          }
        });
      });

      campoContainer.appendChild(linhaDiv);
    });
  }

  function renderCampoChip(player) {
    const chip = document.createElement("div");
    chip.className = "campo-chip" + (player.estado === "sai" ? " chip-sai" : player.estado === "entra" ? " chip-entra" : "");
    chip.dataset.playerId = String(player.id);

    if (player.photo) {
      const img = document.createElement("img");
      img.className = "campo-avatar";
      img.src = player.photo;
      img.referrerPolicy = "no-referrer";
      img.onerror = function () {
        const ph = document.createElement("div");
        ph.className = "campo-avatar-placeholder";
        ph.textContent = initials(player.name);
        img.replaceWith(ph);
      };
      chip.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "campo-avatar-placeholder";
      ph.textContent = initials(player.name);
      chip.appendChild(ph);
    }

    const nome = document.createElement("span");
    nome.className = "campo-nome";
    nome.textContent = player.name;
    chip.appendChild(nome);

    return chip;
  }

  function renderPlayerRow(player) {
    const linha = lineOf(player.posPrincipal);
    const row = document.createElement("div");
    row.className = "player";

    if (player.photo) {
      const img = document.createElement("img");
      img.className = "avatar";
      img.src = player.photo;
      img.referrerPolicy = "no-referrer";
      img.onerror = function () {
        const ph = document.createElement("div");
        ph.className = "avatar-placeholder";
        ph.textContent = initials(player.name);
        img.replaceWith(ph);
      };
      row.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "avatar-placeholder";
      ph.textContent = initials(player.name);
      row.appendChild(ph);
    }

    const fields = document.createElement("div");
    fields.className = "player-fields";

    const nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.value = player.name;
    nameInput.addEventListener("input", () => { player.name = nameInput.value; });
    fields.appendChild(nameInput);

    if (!player.isReforco) {
      const ageWrap = document.createElement("span");
      ageWrap.className = "age-wrap";
      ageWrap.appendChild(document.createTextNode("("));
      const ageInput = document.createElement("input");
      ageInput.type = "number";
      ageInput.min = "14";
      ageInput.max = "60";
      ageInput.value = player.age != null ? player.age : "";
      ageInput.addEventListener("input", () => { player.age = ageInput.value; });
      ageWrap.appendChild(ageInput);
      ageWrap.appendChild(document.createTextNode(")"));
      fields.appendChild(ageWrap);
    }

    const badge = document.createElement("span");
    badge.className = "badge " + linha.toLowerCase();
    badge.textContent = player.posPrincipal;
    fields.appendChild(badge);

    if (player.posSecundarias.length > 0) {
      const sec = document.createElement("span");
      sec.className = "secundarias-text";
      sec.textContent = "+ " + player.posSecundarias.join(", ");
      fields.appendChild(sec);
    }

    const posToggleBtn = document.createElement("button");
    posToggleBtn.type = "button";
    posToggleBtn.className = "pos-toggle-btn";
    posToggleBtn.textContent = "Posições";
    posToggleBtn.addEventListener("click", () => {
      openEditorId = openEditorId === player.id ? null : player.id;
      renderSquad();
    });
    fields.appendChild(posToggleBtn);

    if (player.isReforco) {
      const entraBadge = document.createElement("span");
      entraBadge.className = "badge entra";
      entraBadge.textContent = "ENTRA";
      fields.appendChild(entraBadge);
      fields.appendChild(renderValorField(player, "entra"));

      const removeBtn = document.createElement("button");
      removeBtn.className = "remove-link";
      removeBtn.textContent = "Remover";
      removeBtn.addEventListener("click", () => {
        players = players.filter((p) => p !== player);
        renderSquad();
      });
      fields.appendChild(removeBtn);
    } else {
      fields.appendChild(renderEstadoPills(player));
      if (player.estado === "sai") {
        fields.appendChild(renderValorField(player, "sai"));
      }
      if (player.estado === "fora") {
        const restoreBtn = document.createElement("button");
        restoreBtn.className = "remove-link";
        restoreBtn.textContent = "Repor";
        restoreBtn.addEventListener("click", () => {
          player.estado = "fica";
          renderSquad();
        });
        fields.appendChild(restoreBtn);
      }
    }

    if (openEditorId === player.id) {
      fields.appendChild(renderPositionEditor(player));
    }

    row.appendChild(fields);
    return row;
  }

  function renderPositionEditor(player) {
    const box = document.createElement("div");
    box.className = "position-editor";

    const campoPrincipal = document.createElement("div");
    campoPrincipal.className = "campo";
    const labelPrincipal = document.createElement("span");
    labelPrincipal.className = "campo-label";
    labelPrincipal.textContent = "Posição principal";
    campoPrincipal.appendChild(labelPrincipal);
    const selectPrincipal = document.createElement("select");
    selectPrincipal.innerHTML = positionSelectHTML(player.posPrincipal);
    selectPrincipal.addEventListener("change", () => {
      player.posPrincipal = selectPrincipal.value;
      player.posSecundarias = player.posSecundarias.filter((c) => c !== player.posPrincipal);
      renderSquad();
    });
    campoPrincipal.appendChild(selectPrincipal);
    box.appendChild(campoPrincipal);

    const campoSecundarias = document.createElement("div");
    campoSecundarias.className = "campo";
    const labelSecundarias = document.createElement("span");
    labelSecundarias.className = "campo-label";
    labelSecundarias.textContent = "Posições secundárias";
    campoSecundarias.appendChild(labelSecundarias);

    POSITION_GROUPS.forEach((g) => {
      const linhaDiv = document.createElement("div");
      linhaDiv.className = "linha-checkboxes";
      const linhaNome = document.createElement("span");
      linhaNome.className = "linha-nome";
      linhaNome.textContent = GROUP_LABELS[g.line] + ": ";
      linhaDiv.appendChild(linhaNome);

      g.codes.forEach((code) => {
        const isPrincipal = code === player.posPrincipal;
        const lbl = document.createElement("label");
        lbl.className = "chk" + (isPrincipal ? " disabled" : "");
        const chk = document.createElement("input");
        chk.type = "checkbox";
        chk.checked = !isPrincipal && player.posSecundarias.includes(code);
        chk.disabled = isPrincipal;
        chk.addEventListener("change", () => {
          if (chk.checked) {
            player.posSecundarias.push(code);
          } else {
            player.posSecundarias = player.posSecundarias.filter((c) => c !== code);
          }
          renderSquad();
        });
        lbl.appendChild(chk);
        lbl.appendChild(document.createTextNode(code + (isPrincipal ? " (principal)" : "")));
        linhaDiv.appendChild(lbl);
      });

      campoSecundarias.appendChild(linhaDiv);
    });

    box.appendChild(campoSecundarias);

    const closeBtn = document.createElement("button");
    closeBtn.type = "button";
    closeBtn.className = "secondary";
    closeBtn.textContent = "Fechar";
    closeBtn.addEventListener("click", () => {
      openEditorId = null;
      renderSquad();
    });
    box.appendChild(closeBtn);

    return box;
  }

  function renderEstadoPills(player) {
    const wrap = document.createElement("span");
    wrap.className = "pills";
    const opcoes = [
      { estado: "fica", label: "Fica" },
      { estado: "sai", label: "Sai" },
      { estado: "fora", label: "Fora" }
    ];
    opcoes.forEach((op) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "pill " + op.estado + (player.estado === op.estado ? " active" : "");
      btn.textContent = op.label;
      btn.addEventListener("click", () => {
        player.estado = op.estado;
        renderSquad();
      });
      wrap.appendChild(btn);
    });
    return wrap;
  }

  function renderValorField(player, tipo) {
    const wrap = document.createElement("span");
    wrap.className = "value-fields";

    const valorInput = document.createElement("input");
    valorInput.type = "number";
    valorInput.min = "0";
    valorInput.step = "0.1";
    valorInput.placeholder = "Valor";
    valorInput.value = player.valor != null ? player.valor : "";
    valorInput.addEventListener("input", () => {
      player.valor = valorInput.value;
      updateSaldoDisplay();
    });
    wrap.appendChild(document.createTextNode("Valor (M€)"));
    wrap.appendChild(valorInput);

    if (tipo === "sai") {
      const pctInput = document.createElement("input");
      pctInput.type = "number";
      pctInput.min = "0";
      pctInput.max = "100";
      pctInput.value = player.clubPct != null ? player.clubPct : 100;
      pctInput.addEventListener("input", () => {
        player.clubPct = pctInput.value;
        updateSaldoDisplay();
      });
      wrap.appendChild(document.createTextNode("Fica no clube (%)"));
      wrap.appendChild(pctInput);
    }

    return wrap;
  }

  const EXPORT_WIDTH = 700;

  async function imageToDataURL(url) {
    try {
      const res = await fetch(url, { mode: "cors" });
      if (!res.ok) return null;
      const blob = await res.blob();
      return await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(blob);
      });
    } catch (e) {
      return null;
    }
  }

  function construirListaTransferencias(titulo, lista, tipo) {
    const box = document.createElement("div");
    box.style.cssText = "flex:1; background:#1D2C39; border-radius:8px; padding:10px; font-size:11px; font-family:'IBM Plex Sans', Arial, sans-serif; color:#EAEDEF;";

    const titleEl = document.createElement("div");
    titleEl.style.cssText = "font-family:'Big Shoulders Display', Arial, sans-serif; font-weight:700; font-size:13px; letter-spacing:0.03em; text-transform:uppercase; margin-bottom:6px; color:#B8955A;";
    titleEl.textContent = titulo;
    box.appendChild(titleEl);

    if (lista.length === 0) {
      const vazio = document.createElement("div");
      vazio.style.cssText = "color:#8A9BA8;";
      vazio.textContent = "Nenhum";
      box.appendChild(vazio);
    }

    lista.forEach((p) => {
      const linha = document.createElement("div");
      linha.style.cssText = "display:flex; justify-content:space-between; gap:8px; padding:3px 0; border-bottom:1px solid #24343F;";
      const nome = document.createElement("span");
      nome.textContent = p.name;
      const valorTxt = document.createElement("span");
      valorTxt.style.cssText = "white-space:nowrap; font-family:'IBM Plex Mono', monospace;";
      const valor = parseFloat(p.valor) || 0;
      if (tipo === "sai") {
        const pct = p.clubPct != null ? parseFloat(p.clubPct) : 100;
        const contribuicao = valor * (pct / 100);
        valorTxt.textContent = valor.toLocaleString("pt-PT", { maximumFractionDigits: 1 }) + "M€ (" + pct + "%) = " +
          contribuicao.toLocaleString("pt-PT", { maximumFractionDigits: 1 }) + "M€";
      } else {
        valorTxt.textContent = "-" + valor.toLocaleString("pt-PT", { maximumFractionDigits: 1 }) + "M€";
      }
      linha.appendChild(nome);
      linha.appendChild(valorTxt);
      box.appendChild(linha);
    });

    return box;
  }

          } else {
            const ph = document.createElement("div");
            ph.style.cssText = "width:16px; height:16px; border-radius:50%; background:#C7CFD6; color:#1C242B; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; flex-shrink:0;";
            ph.textContent = initials(player.name);
            chip.appendChild(ph);
          }

          const nome = document.createElement("span");
          nome.style.cssText = "overflow:hidden; text-overflow:ellipsis; white-space:nowrap;";
          nome.textContent = player.name;
          chip.appendChild(nome);

          zona.appendChild(chip);
        });

        linhaDiv.appendChild(zona);
      });

      pitch.appendChild(linhaDiv);
    });
    container.appendChild(pitch);

    const listas = document.createElement("div");
    listas.style.cssText = "display:flex; gap:16px; margin-top:14px;";
    listas.appendChild(construirListaTransferencias("Saem", saem, "sai"));
    listas.appendChild(construirListaTransferencias("Entram", entram, "entra"));
    container.appendChild(listas);

    return container;
  }

  document.getElementById("exportarImagemBtn").addEventListener("click", async () => {
    const exportBtn = document.getElementById("exportarImagemBtn");
    const textoOriginal = exportBtn.textContent;
    exportBtn.disabled = true;
    exportBtn.textContent = "A gerar imagem...";
    let template = null;
    try {
      template = await construirTemplateExportacao();
      document.body.appendChild(template);
      const canvas = await html2canvas(template, { backgroundColor: "#0E1A24", scale: 2 });
      const link = document.createElement("a");
      link.download = (squadClubName.textContent || "plantel").trim().replace(/\s+/g, "_") + "_diretor-desportivo.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    } catch (err) {
      alert("Não foi possível gerar a imagem: " + err.message);
    } finally {
      if (template) template.remove();
      exportBtn.disabled = false;
      exportBtn.textContent = textoOriginal;
    }
  });

  // Arranque
  if (getKey()) {
    showSearchScreen();
  } else {
    showKeyScreen();
  }
</script>

</body>
</html>
